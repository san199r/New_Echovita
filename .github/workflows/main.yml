name: Echovita Data Pipeline

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI
  # push:            # Uncomment to run on every push to main
  #   branches: [ "main" ]

jobs:
  process-echovita-data:
    # The scraper uses Windows-specific registry keys and paths for Chrome,
    # so we MUST use a Windows runner.
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl undetected-chromedriver selenium pandas xlsxwriter tqdm

      - name: Prepare Workspace Directories
        run: |
          New-Item -ItemType Directory -Force -Path workspace/input
          New-Item -ItemType Directory -Force -Path workspace/output
        shell: powershell

      - name: Run Scraper
        run: python Echovita_Family_Links_Tool_V2_Excel_Input.py

      - name: Clean Dates
        run: python Echovita_Dates_Cleanup_Tool_Updated.py

      - name: Merge Files
        run: python Echovita_Family_Links_Merge_Tool_Excel_Input.py

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Echovita-Results
          path: workspace/output/
